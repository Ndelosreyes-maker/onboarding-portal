<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Employee Document Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="topbar">
    <h1>Legendary Therapy Document Portal</h1>
    <p>Upload your HR documents securely, anytime and anywhere</p>
  </header>

  <div class="container">

    <!-- SEARCH SCREEN -->
    <div id="searchScreen">

      <div class="card search-card">
        <h2>Find Your Profile</h2>
        <p class="sub">Enter your Portal ID to access your document portal</p>

        <div class="searchRow">
          <input id="portalId" placeholder="Enter your Portal ID" />
          <button id="findBtn">Find</button>
        </div>

        <div id="profileResult"></div>
      </div>

      <div class="card welcome-card">
        <div class="icon">👤</div>
        <h3>Welcome to the Document Portal</h3>
        <p>Enter your Portal ID above to begin</p>
      </div>

    </div>

    <!-- PORTAL SCREEN -->
    <div id="portalScreen" style="display:none;">

      <div class="card profile-header">
        <div class="icon big">👤</div>
        <h2 id="employeeName"></h2>

        <div class="profile-actions">
          <button id="refreshBtn">Refresh</button>
          <button onclick="location.reload()">Change Employee</button>
        </div>
      </div>

      <!-- COUNTS -->
      <div class="counts" id="counts"></div>

      <!-- PROGRESS -->
      <div class="progress-wrapper">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- DOCUMENT LIST -->
      <div id="docList" class="doc-grid">
        <!-- existing docRows stay exactly same -->
      </div>

      <button id="submitBtn" class="submit">Submit Documents</button>

    </div>

  </div>

</div>
<script src="script.js"></script>
</body>
</html>
