<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Legendary Therapy Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Legendary Therapy Portal</h1>
</header>

<div class="container">

<!-- SEARCH -->
<div id="searchScreen">

  <div class="searchCard">
    <h2>Find Your Profile</h2>

    <div class="searchRow">
      <input id="portalId" placeholder="Enter Portal ID">
      <button id="findBtn">Find</button>
    </div>

    <div id="profileResult"></div>
  </div>

</div>

<!-- PORTAL -->
<div id="portalScreen" style="display:none;">

  <div class="profileBar">
    <div class="profileName" id="employeeName"></div>

    <div class="profileBtns">
      <button id="refreshBtn">Refresh</button>
      <button onclick="location.reload()">Change Employee</button>
    </div>
  </div>

  <div id="counts" class="counts"></div>

  <div class="progress-wrapper">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="docList" class="docGrid">

    <!-- I-9 -->
    <div class="docCard" data-col="color_mm02wc6g">
      <div class="docHeader">
        <span>I-9</span>
        <span class="status pending">Pending</span>
      </div>

      <div class="uploadBox">
        <input type="file" name="file_mm02wc6g" class="fileInput">
        <div class="uploadText">Upload I-9</div>
      </div>
    </div>

    <!-- Physical -->
    <div class="docCard" data-col="color_mm02tfs6">
      <div class="docHeader">
        <span>Physical</span>
        <span class="status pending">Pending</span>
      </div>

      <input type="date" id="physicalExp" class="expInput">

      <div class="uploadBox">
        <input type="file" name="file_mm02tfs6" class="fileInput">
        <div class="uploadText">Upload Physical</div>
      </div>
    </div>

    <!-- Liability -->
    <div class="docCard" data-col="color_mm02q4hg">
      <div class="docHeader">
        <span>Liability Insurance</span>
        <span class="status pending">Pending</span>
      </div>

      <input type="date" id="liabilityExp" class="expInput">

      <div class="uploadBox">
        <input type="file" name="file_mm02q4hg" class="fileInput">
        <div class="uploadText">Upload Liability</div>
      </div>
    </div>

    <!-- Registration -->
    <div class="docCard" data-col="color_mm02xndg">
      <div class="docHeader">
        <span>Registration</span>
        <span class="status pending">Pending</span>
      </div>

      <input type="date" id="registrationExp" class="expInput">

      <div class="uploadBox">
        <input type="file" name="file_mm02xndg" class="fileInput">
        <div class="uploadText">Upload Registration</div>
      </div>
    </div>

  </div>

  <button id="submitBtn" class="submitBtn">Submit Documents</button>

</div>
</div>

<div id="toast"></div>

<div id="modal" class="modal">
  <div class="modalBox">
    <p>Submit documents?</p>
    <button id="confirmBtn">Yes</button>
    <button id="cancelBtn">Cancel</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
