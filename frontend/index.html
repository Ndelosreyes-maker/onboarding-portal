<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Employee Document Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Employee Document Portal</h1>

<!-- SEARCH SCREEN -->
<div id="searchScreen">

  <div class="card">
    <input id="portalId" placeholder="Enter your Portal ID">
    <div id="profileResult"></div>
  </div>

</div>

<!-- PORTAL SCREEN -->
<div id="portalScreen" style="display:none;">

  <p id="employeeName"></p>
  <button id="refreshBtn">Refresh</button>
  <p id="counts"></p>

  <div class="progress-wrapper">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="card">

    <h3>Documents</h3>

   <div id="docList">

<div class="docRow" data-col="color_mm02nvg7">
  <span>SSN</span>
  <span class="status">Pending</span>
  <input type="file" name="file_mm027d47">
</div>

<div class="docRow" data-col="color_mm02f6sk">
  <span>PETS</span>
  <span class="status">Pending</span>
  <input type="file" name="file_mm02dgx5">
</div>

<div class="docRow" data-col="color_mm02w1nr">
  <span>Statewide</span>
  <span class="status">Pending</span>
  <input type="file" name="file_mm02vxj1">
</div>

<div class="docRow" data-col="color_mm02wex8">
  <span>I-9</span>
  <span class="status">Pending</span>
  <input type="file" name="file_mm02wc6g">
</div>

</div>

    <button id="submitBtn">Submit Documents</button>

  </div>

</div>

</div>

<div id="toast"></div>

<div id="modal" class="modal">
<div class="modal-content">
<p>Submit documents?</p>
<button id="confirmBtn">Yes</button>
<button id="cancelBtn">Cancel</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
